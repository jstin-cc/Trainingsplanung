<!DOCTYPE html>
<html lang="de" data-theme="dark" data-variant="pure" data-glow="on" data-bg="raster">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trainingsplanung</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=Archivo:wght@500;600;700;800;900&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  /* ---------- Themes ---------- */
  html[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0c0c0e;
    --surface: #18181c;
    --surface-2: #212126;
    --field: rgba(255,255,255,0.06);
    --border: rgba(255,255,255,0.08);
    --border-strong: rgba(255,255,255,0.15);
    --text: #f2f2f5;
    --text-muted: #9a9aa3;
    --text-dim: #54545e;
    --dot1: #86efac;
    --dot2: #4ade80;
    --dot3: #facc15;
    --dot4: #fb923c;
    --dot5: #f87171;
    --dot-off: #2c2c33;
    --koppel: #fbbf24;
    --shadow-card: 0 1px 2px rgba(0,0,0,0.3), 0 8px 28px rgba(0,0,0,0.25);
    --shadow-pop: 0 12px 40px rgba(0,0,0,0.5);
    --header-bg: rgba(12,12,14,0.55);
    --glass: rgba(28,28,34,0.38);
    --glass-2: rgba(255,255,255,0.03);
    --glass-border: rgba(255,255,255,0.10);
    --glass-highlight: rgba(255,255,255,0.06);
    /* accent fallback until JS sets it */
    --accent: #0A84FF;
    --accent-contrast: #ffffff;
    --accent-tint: rgba(10,132,255,0.13);
    --accent-ring: rgba(10,132,255,0.25);
    --accent-shadow: 0 5px 16px rgba(10,132,255,0.35);
  }
  html[data-theme="light"] {
    color-scheme: light;
    --bg: #f4f4f6;
    --surface: #ffffff;
    --surface-2: #f7f7f9;
    --field: rgba(20,20,40,0.05);
    --border: rgba(20,20,30,0.08);
    --border-strong: rgba(20,20,30,0.16);
    --text: #1c1c21;
    --text-muted: #6e6e76;
    --text-dim: #b3b3bb;
    --dot1: #34d399;
    --dot2: #10b981;
    --dot3: #f59e0b;
    --dot4: #f97316;
    --dot5: #ef4444;
    --dot-off: #e4e4e9;
    --koppel: #d97706;
    --shadow-card: 0 1px 2px rgba(20,20,40,0.04), 0 8px 24px rgba(20,20,40,0.06);
    --shadow-pop: 0 16px 48px rgba(20,20,40,0.18);
    --header-bg: rgba(244,244,246,0.55);
    --glass: rgba(255,255,255,0.42);
    --glass-2: rgba(255,255,255,0.35);
    --glass-border: rgba(255,255,255,0.65);
    --glass-highlight: rgba(255,255,255,0.85);
    --accent: #0A84FF;
    --accent-contrast: #ffffff;
    --accent-tint: rgba(10,132,255,0.13);
    --accent-ring: rgba(10,132,255,0.25);
    --accent-shadow: 0 5px 16px rgba(10,132,255,0.35);
  }

  /* ---------- Variants ---------- */
  html[data-variant="pure"] {
    --font-display: 'Hanken Grotesk';
    --r-lg: 16px; --r-md: 12px; --r-sm: 10px;
    --day-case: none; --day-ls: -0.01em; --day-weight: 700;
  }
  html[data-variant="athletic"] {
    --font-display: 'Archivo';
    --r-lg: 12px; --r-md: 9px; --r-sm: 8px;
    --day-case: uppercase; --day-ls: 0.07em; --day-weight: 800;
  }
  html[data-variant="soft"] {
    --font-display: 'Sora';
    --r-lg: 20px; --r-md: 15px; --r-sm: 12px;
    --day-case: none; --day-ls: 0; --day-weight: 600;
  }
  html[data-glow="off"] .glow { box-shadow: none !important; }

  /* ---------- Liquid Glass ---------- */
  .day-card, .stat-card, .preview-card, .summary-empty, .wk-pop, .theme-toggle {
    background: var(--glass);
    -webkit-backdrop-filter: blur(18px) saturate(1.6);
    backdrop-filter: blur(18px) saturate(1.6);
    border: 1px solid var(--glass-border);
    box-shadow: inset 0 1px 0 var(--glass-highlight), var(--shadow-card);
    position: relative;
    overflow: hidden;
    transition: transform 0.2s cubic-bezier(0.3, 0.7, 0.4, 1), box-shadow 0.2s, border-color 0.2s;
  }
  .day-card:hover, .stat-card:hover, .preview-card:hover {
    transform: translateY(-2px);
    box-shadow: inset 0 1px 0 var(--glass-highlight), var(--shadow-pop);
  }
  /* Taschenlampen-Highlight — folgt dem Cursor über das Element */
  .day-card::after, .stat-card::after, .preview-card::after, .theme-toggle::after {
    content: '';
    pointer-events: none;
    position: absolute;
    inset: 0;
    border-radius: inherit;
    opacity: 0;
    transition: opacity 0.3s ease;
    background: radial-gradient(
      150px circle at var(--lx, 50%) var(--ly, 50%),
      var(--torch-color, rgba(255,255,255,0.05)) 0%,
      transparent 70%
    );
    z-index: 1;
  }
  .day-card:hover::after, .stat-card:hover::after,
  .preview-card:hover::after, .theme-toggle:hover::after {
    opacity: 1;
  }
  html[data-theme="dark"] { --torch-color: rgba(255,255,255,0.05); }
  html[data-theme="light"] { --torch-color: rgba(255,255,255,0.22); }

  /* ---------- Hintergrund-Optionen ---------- */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -1;
  }
  @keyframes aurora-drift {
    from { transform: translate3d(0, 0, 0) scale(1); }
    to { transform: translate3d(-2.5%, 1.8%, 0) scale(1.08); }
  }
  html[data-bg="aurora"] body::before {
    inset: -12%;
    animation: aurora-drift 60s ease-in-out infinite alternate;
    background:
      radial-gradient(640px 420px at 88% -12%, color-mix(in srgb, var(--accent) 21%, transparent), transparent 70%),
      radial-gradient(760px 540px at -12% 28%, color-mix(in srgb, var(--accent) 13%, transparent), transparent 70%),
      radial-gradient(560px 440px at 58% 112%, color-mix(in srgb, var(--accent) 9%, transparent), transparent 72%);
  }
  html[data-theme="light"][data-bg="aurora"] body::before { opacity: 0.55; }
  html[data-bg="raster"] body::before {
    background-image: radial-gradient(var(--border-strong) 1px, transparent 1.3px);
    background-size: 22px 22px;
    -webkit-mask-image: linear-gradient(180deg, black 0%, rgba(0,0,0,0.35) 55%, transparent 92%);
    mask-image: linear-gradient(180deg, black 0%, rgba(0,0,0,0.35) 55%, transparent 92%);
  }
  html[data-bg="verlauf"] body::before {
    background: linear-gradient(180deg, color-mix(in srgb, var(--accent) 10%, var(--bg)) 0%, var(--bg) 42%);
  }

  html, body { height: 100%; }
  body {
    font-family: 'Hanken Grotesk', sans-serif;
    background: var(--bg);
    color: var(--text);
    overflow: hidden;
    font-feature-settings: 'tnum';
    transition: background 0.25s;
  }
  button { font-family: inherit; }
  ::selection { background: var(--accent-tint); }

  /* ---------- Header ---------- */
  .app-header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 20;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 0 24px;
    background: var(--header-bg);
    backdrop-filter: blur(20px) saturate(1.5);
    -webkit-backdrop-filter: blur(20px) saturate(1.5);
    border-bottom: 1px solid var(--border);
  }
  .logo-mark {
    width: 30px; height: 30px;
    border-radius: 9px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    box-shadow: var(--accent-shadow);
    flex-shrink: 0;
  }
  .logo-mark svg { display: block; }
  .app-title {
    font-family: var(--font-display), sans-serif;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.01em;
    white-space: nowrap;
  }
  .kw-pill {
    background: var(--accent-tint);
    color: var(--accent);
    font-size: 12px;
    font-weight: 700;
    padding: 4px 11px;
    border-radius: 999px;
    white-space: nowrap;
    border: none;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-family: inherit;
    transition: filter 0.15s;
  }
  .kw-pill:hover { filter: brightness(1.15); }

  /* Week picker */
  .wk-group { display: flex; align-items: center; gap: 2px; position: relative; }
  .wk-arrow {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.15s, color 0.15s;
  }
  .wk-arrow:hover { background: var(--field); color: var(--text); }
  .wk-overlay { position: fixed; inset: 0; z-index: 40; }
  .wk-pop {
    position: absolute;
    top: calc(100% + 12px);
    left: 0;
    border-radius: var(--r-md);
    box-shadow: inset 0 1px 0 var(--glass-highlight), var(--shadow-pop);
    padding: 6px;
    width: 252px;
    max-height: 340px;
    overflow-y: auto;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .wk-pop::-webkit-scrollbar { width: 4px; }
  .wk-pop::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }
  .wk-item {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    padding: 8px 11px;
    border: none;
    background: transparent;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    text-align: left;
    transition: background 0.12s;
  }
  .wk-item:hover { background: var(--field); }
  .wk-item.sel { background: var(--accent-tint); color: var(--accent); }
  .wk-item.sel .wk-range { color: var(--accent); opacity: 0.75; }
  .wk-item .wk-range { margin-left: auto; font-size: 11px; color: var(--text-muted); font-weight: 500; }
  .wk-item .wk-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; }
  .wk-item.today-link {
    color: var(--accent);
    font-weight: 700;
    border-bottom: 1px solid var(--border);
    border-radius: 8px 8px 0 0;
    margin-bottom: 3px;
  }
  .week-range {
    font-size: 13px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .header-spacer { flex: 1; }
  .theme-toggle {
    width: 38px; height: 38px;
    border-radius: 12px;
    color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s, border-color 0.15s, transform 0.1s;
  }
  .theme-toggle:hover { color: var(--text); border-color: var(--border-strong); }
  .theme-toggle:active { transform: scale(0.94); }

  /* ---------- Body layout ---------- */
  .app-body {
    position: fixed;
    top: 60px; left: 0; right: 0; bottom: 0;
    display: flex;
    overflow: hidden;
  }

  /* ---------- Left panel ---------- */
  .left-panel {
    width: 424px;
    flex-shrink: 0;
    overflow-y: auto;
    padding: 20px 20px 40px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .left-panel::-webkit-scrollbar, .right-panel::-webkit-scrollbar { width: 5px; }
  .left-panel::-webkit-scrollbar-track, .right-panel::-webkit-scrollbar-track { background: transparent; }
  .left-panel::-webkit-scrollbar-thumb, .right-panel::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 3px; }

  .panel-eyebrow {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    padding: 2px 4px;
  }

  /* Day card */
  .day-card {
    border-radius: var(--r-lg);
    overflow: hidden;
    flex-shrink: 0;
    animation: card-in 0.4s cubic-bezier(0.3, 0.7, 0.4, 1) backwards;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: none; }
  }
  .left-panel .day-card:nth-child(2) { animation-delay: 0.03s; }
  .left-panel .day-card:nth-child(3) { animation-delay: 0.07s; }
  .left-panel .day-card:nth-child(4) { animation-delay: 0.11s; }
  .left-panel .day-card:nth-child(5) { animation-delay: 0.15s; }
  .left-panel .day-card:nth-child(6) { animation-delay: 0.19s; }
  .left-panel .day-card:nth-child(7) { animation-delay: 0.23s; }
  .left-panel .day-card:nth-child(8) { animation-delay: 0.27s; }
  .day-card.has-content { border-color: color-mix(in srgb, var(--accent) 26%, transparent); }

  .day-head {
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 13px 16px;
    background: transparent;
    border: none;
    cursor: pointer;
    text-align: left;
    color: var(--text);
  }
  .day-head:hover .day-chevron { color: var(--text); }
  .day-name {
    font-family: var(--font-display), sans-serif;
    font-size: 14.5px;
    font-weight: var(--day-weight);
    text-transform: var(--day-case);
    letter-spacing: var(--day-ls);
  }
  .day-date {
    font-size: 12px;
    color: var(--text-dim);
    font-weight: 500;
  }
  .day-badges { display: flex; gap: 5px; margin-left: auto; align-items: center; flex-wrap: wrap; justify-content: flex-end; }
  .day-badge {
    font-size: 10.5px;
    font-weight: 600;
    padding: 2.5px 8px;
    border-radius: 999px;
    background: var(--field);
    color: var(--text-muted);
    display: flex; align-items: center; gap: 5px;
    white-space: nowrap;
  }
  .day-badge .mini-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
  .day-chevron {
    color: var(--text-dim);
    transition: transform 0.25s, color 0.15s;
    flex-shrink: 0;
    display: flex;
  }
  .day-card.open .day-chevron { transform: rotate(180deg); }

  .day-body-wrap {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s cubic-bezier(0.3, 0.9, 0.3, 1);
  }
  .day-card.open .day-body-wrap { grid-template-rows: 1fr; }
  .day-body-inner { overflow: hidden; min-height: 0; }
  .day-body {
    padding: 2px 16px 16px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .block-label {
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 7px;
  }
  .stack-6 { display: flex; flex-direction: column; gap: 6px; }

  /* Fields */
  input[type="text"], input[type="number"] {
    background: var(--field);
    border: 1px solid transparent;
    border-radius: var(--r-sm);
    color: var(--text);
    font-family: 'Hanken Grotesk', sans-serif;
    font-size: 13.5px;
    padding: 9px 12px;
    width: 100%;
    outline: none;
    transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
  }
  input[type="text"]:focus, input[type="number"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-ring);
    background: var(--surface);
  }
  input::placeholder { color: var(--text-dim); }

  /* Sport chips */
  .sport-chips { display: flex; gap: 5px; flex-wrap: wrap; }
  .sport-chip {
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    padding: 5.5px 11px;
    border-radius: 999px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sport-chip:hover { border-color: var(--border-strong); color: var(--text); }
  .sport-chip.on {
    background: var(--accent-tint);
    border-color: color-mix(in srgb, var(--accent) 40%, transparent);
    color: var(--accent);
  }

  /* Intensity dots */
  .intensity-row { display: flex; align-items: center; gap: 10px; }
  .intensity-dots { display: flex; gap: 6px; flex-shrink: 0; }
  .dot-btn {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: var(--dot-off);
    transition: transform 0.12s, background 0.15s;
  }
  .dot-btn:hover { transform: scale(1.18); }
  @keyframes dot-pop {
    0% { transform: scale(1); }
    45% { transform: scale(1.4); }
    100% { transform: scale(1); }
  }
  .dot-btn.on { animation: dot-pop 0.28s cubic-bezier(0.3, 0.7, 0.4, 1); }
  .dot-btn.on.l1 { background: var(--dot1); box-shadow: 0 0 10px var(--dot1); }
  .dot-btn.on.l2 { background: var(--dot2); box-shadow: 0 0 10px var(--dot2); }
  .dot-btn.on.l3 { background: var(--dot3); box-shadow: 0 0 10px var(--dot3); }
  .dot-btn.on.l4 { background: var(--dot4); box-shadow: 0 0 10px var(--dot4); }
  .dot-btn.on.l5 { background: var(--dot5); box-shadow: 0 0 10px var(--dot5); }

  /* Endurance entry */
  .endurance-entry {
    border: 1px solid var(--border);
    border-radius: var(--r-md);
    padding: 11px;
    display: flex;
    flex-direction: column;
    gap: 7px;
    background: var(--glass-2);
  }
  .entry-head { display: flex; align-items: center; gap: 6px; }
  .entry-remove {
    width: 26px; height: 26px;
    border-radius: 8px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 15px;
    transition: color 0.15s, background 0.15s;
  }
  .entry-remove:hover { color: var(--dot5); background: color-mix(in srgb, var(--dot5) 12%, transparent); }

  .metric-row { display: flex; gap: 6px; align-items: center; }
  .unit-field { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
  .unit-field input { width: 64px; text-align: right; -moz-appearance: textfield; }
  .unit-field input::-webkit-outer-spin-button, .unit-field input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  .unit-field span { font-size: 11px; color: var(--text-dim); font-weight: 600; }

  .add-entry-btn {
    display: flex; align-items: center; justify-content: center; gap: 7px;
    background: transparent;
    border: 1.5px dashed var(--border-strong);
    border-radius: var(--r-sm);
    color: var(--text-muted);
    font-size: 12.5px;
    font-weight: 600;
    padding: 8px 12px;
    cursor: pointer;
    width: 100%;
    transition: all 0.15s;
  }
  .add-entry-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-tint); }

  /* Koppel */
  .koppel-toggle { display: flex; align-items: center; gap: 8px; }
  .koppel-line { flex: 1; height: 1px; background: var(--border); }
  .koppel-btn {
    display: flex; align-items: center; gap: 5px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--text-dim);
    font-size: 11px;
    font-weight: 600;
    padding: 4px 11px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .koppel-btn:hover { border-color: var(--koppel); color: var(--koppel); }
  .koppel-btn.on {
    border-color: var(--koppel);
    background: color-mix(in srgb, var(--koppel) 13%, transparent);
    color: var(--koppel);
  }

  /* ---------- Right panel ---------- */
  @keyframes panel-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: none; }
  }
  .right-panel > * { animation: panel-in 0.3s ease backwards; }
  .right-panel {
    flex: 1;
    min-width: 0;
    overflow-y: auto;
    padding: 24px 28px 40px;
    display: flex;
    flex-direction: column;
    gap: 22px;
  }

  .section-head {
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  .section-title {
    font-family: var(--font-display), sans-serif;
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -0.01em;
  }
  .section-sub { font-size: 12.5px; color: var(--text-muted); }

  /* Summary */
  .summary-row {
    display: flex;
    gap: 12px;

  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value} onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio" aria-checked={on} data-on={on ? '1' : '0'} aria-label={colors.join(', ')} title={colors.join(' · ')} style={{ background: hero }} onClick={() => onChange(o)}>
              {sup.length > 0 && (<span>{sup.map((c, j) => <i key={j} style={{ background: c }} />)}</span>)}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}
</script>

<script type="text/babel">
// Trainingsplanung v2 — App-Logik
const { useState, useEffect, useCallback } = React;

// ---------- Konstanten ----------
const DAYS = ['Mo', 'Di', 'Mi', 'Do', 'Fr', 'Sa', 'So'];
const DAY_FULL = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
const SPORTS = ['Schwimmen', 'Radfahren', 'Laufen', 'Sonstiges'];
const SPORT_SHORT = { Schwimmen: 'Schwimmen', Radfahren: 'Rad', Laufen: 'Laufen', Sonstiges: 'Sonstiges' };

const SPORT_HINTS = {
  Schwimmen: { distance: '2000', pace: '1:45 /100m' },
  Radfahren: { distance: '30', pace: '32 km/h' },
  Laufen:    { distance: '10', pace: '5:10 /km' },
  Sonstiges: { distance: '–', pace: 'Pace' },
  '':        { distance: '–', pace: 'Pace' },
};
// Default pace values pre-filled when selecting a sport
const SPORT_PACE_DEFAULTS = {
  Schwimmen: '1:45 /100m',
  Radfahren: '32 km/h',
  Laufen:    '5:10 /km',
  Sonstiges: '',
};
const SPORT_UNIT = { Schwimmen: 'm', Radfahren: 'km', Laufen: 'km', Sonstiges: 'km', '': 'km' };

const ACCENTS = {
  '#0A84FF': { contrast: '#ffffff' },
  '#84CC16': { contrast: '#131803' },
  '#FF6B2C': { contrast: '#ffffff' },
  '#7C6AF7': { contrast: '#ffffff' },
};
const VARIANTS = { 'Pure': 'pure', 'Athletic': 'athletic', 'Soft': 'soft' };
const BG_MODES = { 'Ohne': 'none', 'Aurora': 'aurora', 'Raster': 'raster', 'Verlauf': 'verlauf' };

const TWEAK_DEFAULTS = {
  "variante": "Pure",
  "akzent": "#7C6AF7",
  "hintergrund": "Raster",
  "glow": true
};

// ---------- Daten ----------
const defaultEnduranceEntry = () => ({ title: '', sport: '', intensity: 0, duration: 0, distance: 0, pace: '', label: '', note: '', coupled: false });
const defaultDay = () => ({ strengthTitle: '', strengthNote: '', strengthDuration: 0, strengthMuscles: [], endurance: [] });
const defaultWeek = () => DAYS.map(() => defaultDay());

const migrateDay = (d) => {
  if (!d.endurance) {
    const old = { ...defaultEnduranceEntry(), intensity: d.intensity || 0, label: d.enduranceLabel || '' };
    const hasOld = old.intensity > 0 || old.label;
    return { ...defaultDay(), strengthTitle: d.strengthTitle || '', strengthNote: d.strengthNote || '', endurance: hasOld ? [old] : [] };
  }
  return d;
};

const loadState = () => {
  try {
    const s = localStorage.getItem('trainingsplanung_v2');
    if (s) return JSON.parse(s).map(migrateDay);
    const v1 = localStorage.getItem('trainingsplanung_v1');
    if (v1) return JSON.parse(v1).map(migrateDay);
  } catch(e) {}
  return defaultWeek();
};

// ---------- Helpers ----------
const getISOWeek = (d = new Date()) => {
  const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = date.getUTCDay() || 7;
  date.setUTCDate(date.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(date.getUTCFullYear(), 0, 1));
  return Math.ceil((((date - yearStart) / 86400000) + 1) / 7);
};
const isoWeekYear = (d = new Date()) => {
  const date = new Date(d);
  date.setDate(d.getDate() - ((d.getDay() + 6) % 7) + 3);
  return date.getFullYear();
};
const weeksInISOYear = (y) => getISOWeek(new Date(y, 11, 28));
const currentSel = () => ({ year: isoWeekYear(), week: getISOWeek() });
const weekKeyOf = (sel) => `${sel.year}-W${String(sel.week).padStart(2, '0')}`;
const shiftSel = (sel, delta) => {
  let { year, week } = sel;
  week += delta;
  while (week < 1) { year -= 1; week += weeksInISOYear(year); }
  while (week > weeksInISOYear(year)) { week -= weeksInISOYear(year); year += 1; }
  return { year, week };
};
const getDateOfISOWeek = (sel) => {
  const simple = new Date(sel.year, 0, 4);
  const dow = (simple.getDay() + 6) % 7;
  const monday = new Date(simple);
  monday.setDate(simple.getDate() - dow + (sel.week - 1) * 7);
  return monday;
};
const getWeekDates = (sel) => {
  const monday = getDateOfISOWeek(sel || currentSel());
  return DAYS.map((_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d;
  });
};
const fmtDate = (d) => `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}.`;
const fmtRange = (dates) => {
  const a = dates[0], b = dates[6];
  const months = ['Jan.','Feb.','März','Apr.','Mai','Juni','Juli','Aug.','Sep.','Okt.','Nov.','Dez.'];
  if (a.getMonth() === b.getMonth()) return `${a.getDate()}.–${b.getDate()}. ${months[a.getMonth()]} ${b.getFullYear()}`;
  return `${a.getDate()}. ${months[a.getMonth()]} – ${b.getDate()}. ${months[b.getMonth()]} ${b.getFullYear()}`;
};
const fmtRangeShort = (dates) => `${fmtDate(dates[0])} – ${fmtDate(dates[6])}`;

const isActiveEntry = (e) => !!(
  (e.title && e.title.trim()) || (e.sport && e.sport.trim()) || e.intensity > 0 || (e.duration || 0) > 0 ||
  (parseFloat(e.distance) || 0) > 0 || (e.pace && e.pace.trim()) ||
  (e.label && e.label.trim()) || (e.note && e.note.trim())
);
const intensityZone = (i) => (i <= 2 ? 0 : i === 3 ? 1 : 2);
const fmtDuration = (min) => {
  const m = Math.round(min || 0);
  if (m < 60) return m + ' min';
  const h = Math.floor(m / 60);
  const r = m % 60;
  return r ? `${h}:${String(r).padStart(2, '0')} h` : `${h} h`;
};

const computeStats = (week) => {
  let strengthCount = 0, enduranceCount = 0, totalMinutes = 0;
  const zoneCounts = [0, 0, 0];
  const zoneMinutes = [0, 0, 0];
  week.forEach((day) => {
    if (day.strengthTitle && day.strengthTitle.trim()) strengthCount++;
    (day.endurance || []).forEach((e) => {
      if (!isActiveEntry(e)) return;
      enduranceCount++;
      const dur = e.duration || 0;
      totalMinutes += dur;
      if (e.intensity > 0) {
        const z = intensityZone(e.intensity);
        zoneCounts[z]++;
        zoneMinutes[z] += dur;
      }
    });
  });
  return {
    strengthCount, enduranceCount,
    sessions: strengthCount + enduranceCount,
    totalMinutes, zoneCounts, zoneMinutes,
    hasDuration: zoneMinutes.some(m => m > 0),
  };
};

const hexA = (hex, a) => {
  const h = hex.replace('#','');
  const r = parseInt(h.substr(0,2),16), g = parseInt(h.substr(2,2),16), b = parseInt(h.substr(4,2),16);
  return `rgba(${r},${g},${b},${a})`;
};
const cssVar = (name) => getComputedStyle(document.documentElement).getPropertyValue(name).trim();

const dayHasContent = (day) => !!(day.strengthTitle && day.strengthTitle.trim()) || (day.endurance || []).some(isActiveEntry);

// Mehrwochen-Speicher
const loadAllWeeks = () => {
  try {
    const s = localStorage.getItem('tp_weeks_v1');
    if (s) return JSON.parse(s);
  } catch(e) {}
  const legacy = loadState();
  const obj = {};
  if (legacy.some(dayHasContent)) obj[weekKeyOf(currentSel())] = legacy;
  return obj;
};
const saveAllWeeks = (all) => {
  try { localStorage.setItem('tp_weeks_v1', JSON.stringify(all)); } catch(e) {}
};

// ---------- Eingabe-Komponenten ----------
function IntensityDots({ value, onChange }) {
  return (
    <div className="intensity-dots">
      {[1,2,3,4,5].map(lvl => (
        <button
          key={lvl}
          className={`dot-btn glow${value === lvl ? ` on l${lvl}` : ''}`}
          title={`Intensität ${lvl} von 5`}
          onClick={() => onChange(value === lvl ? 0 : lvl)}
        ></button>
      ))}
    </div>
  );
}

function EnduranceEntryInput({ entry, onChange, onRemove }) {
  const set = (field, val) => onChange({ ...entry, [field]: val });
  const setSport = (s) => {
    const newSport = entry.sport === s ? '' : s;
    const updates = { ...entry, sport: newSport };
    // Pre-fill pace if empty or still an untouched default from another sport
    const isDefaultPace = !entry.pace || Object.values(SPORT_PACE_DEFAULTS).includes(entry.pace);
    if (isDefaultPace) {
      updates.pace = newSport ? (SPORT_PACE_DEFAULTS[newSport] || '') : '';
    }
    onChange(updates);
  };
  const hints = SPORT_HINTS[entry.sport] || SPORT_HINTS[''];
  const unit = SPORT_UNIT[entry.sport || ''];
  const distVal = parseFloat(entry.distance) || 0;
  return (
    <div className="endurance-entry">
      <div className="entry-head">
        <div className="sport-chips" style={{ flex: 1 }}>
          {SPORTS.map(s => (
            <button key={s} className={`sport-chip${entry.sport === s ? ' on' : ''}`}
              onClick={() => setSport(s)}>{SPORT_SHORT[s]}</button>
          ))}
        </div>
        <button className="entry-remove" onClick={onRemove} title="Einheit entfernen">✕</button>
      </div>
      <input type="text" placeholder="Titel (z.B. Longrun, Intervalle)" value={entry.title} onChange={e => set('title', e.target.value)} />
      <div className="intensity-row">
        <IntensityDots value={entry.intensity} onChange={v => set('intensity', v)} />
        <div className="unit-field">
          <input type="number" min="0" placeholder="–" value={entry.duration || ''} onChange={e => set('duration', e.target.value === '' ? 0 : Math.max(0, parseInt(e.target.value, 10) || 0))} />
          <span>min</span>
        </div>
      </div>
      <div className="metric-row">
        <div className="unit-field">
          <input type="number" min="0" step="0.1" placeholder={hints.distance} value={distVal || ''} onChange={e => set('distance', e.target.value === '' ? 0 : Math.max(0, parseFloat(e.target.value) || 0))} />
          <span>{unit}</span>
        </div>
        <input type="text" placeholder={`Pace (z.B. ${hints.pace})`} value={entry.pace || ''} onChange={e => set('pace', e.target.value)} style={{ flex: 1 }} />
      </div>
      <div className="metric-row">
        <input type="text" placeholder="Label (z.B. 4×8', lang)" value={entry.label} onChange={e => set('label', e.target.value)} style={{ flex: 1 }} />
        <input type="text" placeholder="Notiz" value={entry.note} onChange={e => set('note', e.target.value)} style={{ flex: 1.4 }} />
      </div>
    </div>
  );
}

function DayCard({ idx, day, date, open, onToggle, onChange }) {
  const setDay = (newDay) => onChange(idx, newDay);
  const setEndurance = (eIdx, newEntry) => {
    const next = [...day.endurance];
    next[eIdx] = newEntry;
    setDay({ ...day, endurance: next });
  };
  const addEndurance = () => setDay({ ...day, endurance: [...day.endurance, defaultEnduranceEntry()] });
  const removeEndurance = (eIdx) => setDay({ ...day, endurance: day.endurance.filter((_, i) => i !== eIdx) });

  const hasContent = dayHasContent(day);
  const activeEnd = (day.endurance || []).filter(isActiveEntry);

  return (
    <div className={`day-card${open ? ' open' : ''}${hasContent ? ' has-content' : ''}`}>
      <button className="day-head" onClick={onToggle}>
        <span className="day-name">{DAY_FULL[idx]}</span>
        <span className="day-date">{fmtDate(date)}</span>
        <span className="day-badges">
          {!open && day.strengthTitle.trim() && (
            <span className="day-badge">Kraft</span>
          )}
          {!open && activeEnd.map((e, i) => (
            <span key={i} className="day-badge">
              {e.intensity > 0 && <span className="mini-dot" style={{ background: `var(--dot${e.intensity})` }}></span>}
              {e.sport ? SPORT_SHORT[e.sport] : (e.title || 'Ausdauer')}
            </span>
          ))}
        </span>
        <span className="day-chevron">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M3 6l5 5 5-5"></path>
          </svg>
        </span>
      </button>

      <div className="day-body-wrap">
        <div className="day-body-inner">
          <div className="day-body">
            <div>
              <div className="block-label">Kraft</div>
              <div className="stack-6">
                <input type="text" placeholder="Titel (z.B. Push / Pull / Legs)" value={day.strengthTitle} onChange={e => setDay({ ...day, strengthTitle: e.target.value })} />
                <input type="text" placeholder="Notiz (optional)" value={day.strengthNote} onChange={e => setDay({ ...day, strengthNote: e.target.value })} />
              </div>
            </div>
            <div>
              <div className="block-label">Ausdauer</div>
              <div className="stack-6">
                {day.endurance.map((entry, eIdx) => (
                  <React.Fragment key={eIdx}>
                    <EnduranceEntryInput entry={entry} onChange={(ne) => setEndurance(eIdx, ne)} onRemove={() => removeEndurance(eIdx)} />
                    {eIdx < day.endurance.length - 1 && (
                      <div className="koppel-toggle">
                        <div className="koppel-line"></div>
                        <button className={`koppel-btn${entry.coupled ? ' on' : ''}`} onClick={() => setEndurance(eIdx, { ...entry, coupled: !entry.coupled })} title="Als Koppeltraining markieren">
                          ⛓ {entry.coupled ? 'Koppeltraining' : 'koppeln'}
                        </button>
                        <div className="koppel-line"></div>
                      </div>
                    )}
                  </React.Fragment>
                ))}
                <button className="add-entry-btn" onClick={addEndurance}>
                  <svg width="11" height="11" viewBox="0 0 12 12" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round">
                    <path d="M6 1v10M1 6h10"></path>
                  </svg>
                  Ausdauereinheit hinzufügen
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ---------- Wochenübersicht ----------
const ZONE_LABELS = ['leicht', 'mittel', 'hart'];

function WeekSummary({ week }) {
  const s = computeStats(week);
  if (s.sessions === 0) {
    return <div className="summary-empty">Noch keine Einheiten geplant — wähle links einen Tag und leg los.</div>;
  }
  const distBasis = s.hasDuration ? s.zoneMinutes : s.zoneCounts;
  const distTotal = distBasis.reduce((a, b) => a + b, 0);
  return (
    <div className="summary-row">
      <div className="stat-card">
        <div className="stat-value">{s.sessions}</div>
        <div className="stat-label">Einheiten</div>
      </div>
      <div className="stat-card">
        <div className="stat-value">{s.totalMinutes > 0 ? fmtDuration(s.totalMinutes) : '–'}</div>
        <div className="stat-label">Gesamtzeit</div>
      </div>
      {distTotal > 0 && (
        <div className="stat-card zones">
          <div className="dist-bar">
            {distBasis.map((v, z) => v > 0 && (
              <div key={z} className={`dist-seg z${z}`} style={{ width: `${(v / distTotal) * 100}%` }}
                title={`${ZONE_LABELS[z]}: ${s.hasDuration ? fmtDuration(v) : v + ' Einh.'}`}></div>
            ))}
          </div>
          <div className="dist-legend">
            {ZONE_LABELS.map((lbl, z) => (
              <div key={z} className="dist-legend-item">
                <span className={`dist-dot z${z}`}></span>
                {lbl}{s.zoneCounts[z] > 0 ? ` (${s.zoneCounts[z]})` : ''}
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------- Vorschau ----------
function PvDots({ intensity }) {
  return (
    <div className="pv-dots">
      {[1,2,3,4,5].map(lvl => (
        <div key={lvl} className={`pv-dot glow${intensity === lvl ? ` on l${lvl}` : ''}`}></div>
      ))}
    </div>
  );
}

function EnduranceLines({ entry }) {
  const distNum = parseFloat(entry.distance) || 0;
  const distStr = distNum > 0 ? `${distNum} ${SPORT_UNIT[entry.sport || '']}` : '';
  const durStr = (entry.duration || 0) > 0 ? fmtDuration(entry.duration) : '';
  const metric = [durStr, distStr, entry.pace].filter(x => x && x.trim()).join(' · ');
  return (
    <div className="pv-endurance">
      {entry.sport && <div className="pv-sport">{entry.sport}</div>}
      {entry.title && <div className="pv-title" style={{ fontSize: 12.5 }}>{entry.title}</div>}
      {entry.intensity > 0 && <PvDots intensity={entry.intensity} />}
      {metric && <div className="pv-note">{metric}</div>}
      {entry.label && <div className="pv-note">{entry.label}</div>}
      {entry.note && <div className="pv-note" style={{ fontStyle: 'italic' }}>{entry.note}</div>}
    </div>
  );
}

function PreviewCard({ dayIdx, day, date }) {
  const hasStrength = day.strengthTitle.trim();
  const activeEndurance = day.endurance.filter(isActiveEntry);
  const isEmpty = !hasStrength && activeEndurance.length === 0;
  return (
    <div className="preview-card">
      <div className="pv-day-row">
        <span className="pv-day">{DAYS[dayIdx]}</span>
        <span className="pv-date">{fmtDate(date)}</span>
      </div>
      {isEmpty && <div className="pv-empty">Ruhetag</div>}
      {hasStrength && (
        <div className="pv-strength">
          <div className="pv-eyebrow">Kraft</div>
          <div className="pv-title">{day.strengthTitle}</div>
          {day.strengthNote && <div className="pv-note">{day.strengthNote}</div>}
        </div>
      )}
      {activeEndurance.map((entry, i) => (
        <React.Fragment key={i}>
          {(hasStrength || i > 0) && (
            (i > 0 && activeEndurance[i-1].coupled)
              ? <div className="pv-koppel"><span className="pv-koppel-line"></span>⛓ Koppel<span className="pv-koppel-line"></span></div>
              : <div className="pv-divider"></div>
          )}
          <EnduranceLines entry={entry} />
        </React.Fragment>
      ))}
    </div>
  );
}

// ---------- Export: Querformat ----------
function ExportWide({ week, dates, accent, kw }) {
  const s = computeStats(week);
  const distBasis = s.hasDuration ? s.zoneMinutes : s.zoneCounts;
  const distTotal = distBasis.reduce((a, b) => a + b, 0);
  return (
    <div id="export-wide" style={{ width: 1500, background: 'var(--bg)', color: 'var(--text)', fontFamily: "'Hanken Grotesk', sans-serif", padding: '36px 44px 44px', display: 'flex', flexDirection: 'column', gap: 18 }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>
        <div style={{ width: 34, height: 34, borderRadius: 10, background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke={ACCENTS[accent]?.contrast || '#fff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 9h3l2.5-6 4 12L13 9h4"></path></svg>
        </div>
        <span style={{ fontFamily: "var(--font-display), sans-serif", fontSize: 22, fontWeight: 800, letterSpacing: '-0.01em' }}>Trainingsplan</span>
        <span style={{ background: hexA(accent, 0.14), color: accent, fontSize: 14, fontWeight: 700, padding: '5px 14px', borderRadius: 999 }}>KW {String(kw).padStart(2, '0')}</span>
        <span style={{ fontSize: 14, color: 'var(--text-muted)' }}>{fmtRange(dates)}</span>
        <span style={{ flex: 1 }}></span>
        {s.sessions > 0 && (
          <span style={{ fontSize: 14, color: 'var(--text-muted)', display: 'flex', gap: 22 }}>
            <span><b style={{ color: 'var(--text)' }}>{s.sessions}</b> Einheiten</span>
            {s.totalMinutes > 0 && <span><b style={{ color: 'var(--text)' }}>{fmtDuration(s.totalMinutes)}</b> gesamt</span>}
          </span>
        )}
        {distTotal > 0 && (
          <span style={{ display: 'flex', height: 9, width: 180, borderRadius: 5, overflow: 'hidden', background: 'var(--dot-off)' }}>
            {distBasis.map((v, z) => v > 0 && (<span key={z} style={{ width: `${(v / distTotal) * 100}%`, background: ['var(--dot2)', 'var(--dot3)', 'var(--dot5)'][z] }}></span>))}
          </span>
        )}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 12 }}>
        {week.map((day, idx) => {
          const hasStrength = day.strengthTitle.trim();
          const activeEnd = day.endurance.filter(isActiveEntry);
          const isEmpty = !hasStrength && activeEnd.length === 0;
          return (
            <div key={idx} className="xp-card" style={{ padding: '15px 14px', display: 'flex', flexDirection: 'column', gap: 11, minHeight: 150 }}>
              <div style={{ display: 'flex', alignItems: 'baseline', justifyContent: 'space-between', borderBottom: '1px solid var(--border)', paddingBottom: 9 }}>
                <span className="xp-day" style={{ fontSize: 15 }}>{DAYS[idx]}</span>
                <span style={{ fontSize: 11.5, color: 'var(--text-dim)', fontWeight: 500 }}>{fmtDate(dates[idx])}</span>
              </div>
              {isEmpty && <div style={{ fontSize: 12.5, color: 'var(--text-dim)' }}>Ruhetag</div>}
              {hasStrength && (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 3 }}>
                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.11em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>Kraft</div>
                  <div style={{ fontSize: 14.5, fontWeight: 700, lineHeight: 1.3 }}>{day.strengthTitle}</div>
                  {day.strengthNote && <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.35 }}>{day.strengthNote}</div>}
                </div>
              )}
              {activeEnd.map((entry, i) => {
                const distNum = parseFloat(entry.distance) || 0;
                const distStr = distNum > 0 ? `${distNum} ${SPORT_UNIT[entry.sport || '']}` : '';
                const durStr = (entry.duration || 0) > 0 ? fmtDuration(entry.duration) : '';
                const metric = [durStr, distStr, entry.pace].filter(x => x && x.trim()).join(' · ');
                return (
                  <React.Fragment key={i}>
                    {(hasStrength || i > 0) && (
                      (i > 0 && activeEnd[i-1].coupled)
                        ? <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 9.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: 'var(--koppel)' }}>
                            <span style={{ flex: 1, height: 1, background: hexA('#f59e0b', 0.35) }}></span>⛓ Koppel<span style={{ flex: 1, height: 1, background: hexA('#f59e0b', 0.35) }}></span>
                          </div>
                        : <div style={{ height: 1, background: 'var(--border)' }}></div>
                    )}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                      {entry.sport && <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: accent }}>{entry.sport}</div>}
                      {entry.title && <div style={{ fontSize: 13.5, fontWeight: 700, lineHeight: 1.3 }}>{entry.title}</div>}
                      {entry.intensity > 0 && (
                        <div style={{ display: 'flex', gap: 5 }}>
                          {[1,2,3,4,5].map(lvl => (<span key={lvl} style={{ width: 10, height: 10, borderRadius: '50%', display: 'inline-block', background: entry.intensity === lvl ? `var(--dot${lvl})` : 'var(--dot-off)' }}></span>))}
                        </div>
                      )}
                      {metric && <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.35 }}>{metric}</div>}
                      {entry.label && <div style={{ fontSize: 12, color: 'var(--text-muted)', lineHeight: 1.35 }}>{entry.label}</div>}
                      {entry.note && <div style={{ fontSize: 12, color: 'var(--text-muted)', fontStyle: 'italic', lineHeight: 1.35 }}>{entry.note}</div>}
                    </div>
                  </React.Fragment>
                );
              })}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------- Export: Story (9:16) ----------
function ExportStory({ week, dates, accent, kw }) {
  const s = computeStats(week);
  const distBasis = s.hasDuration ? s.zoneMinutes : s.zoneCounts;
  const distTotal = distBasis.reduce((a, b) => a + b, 0);
  return (
    <div id="export-story" style={{ width: 540, minHeight: 960, background: 'var(--bg)', color: 'var(--text)', fontFamily: "'Hanken Grotesk', sans-serif", padding: '44px 38px', display: 'flex', flexDirection: 'column', gap: 22 }}>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 7 }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 28, height: 28, borderRadius: 8, background: accent, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <svg width="15" height="15" viewBox="0 0 18 18" fill="none" stroke={ACCENTS[accent]?.contrast || '#fff'} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 9h3l2.5-6 4 12L13 9h4"></path></svg>
          </div>
          <span style={{ fontSize: 12, fontWeight: 700, letterSpacing: '0.14em', textTransform: 'uppercase', color: 'var(--text-muted)' }}>Trainingsplan</span>
        </div>
        <div style={{ fontFamily: "var(--font-display), sans-serif", fontSize: 42, fontWeight: 800, letterSpacing: '-0.02em', lineHeight: 1 }}>KW {String(kw).padStart(2, '00')}</div>
        <div style={{ fontSize: 15, color: 'var(--text-muted)' }}>{fmtRange(dates)}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, flex: 1 }}>
        {week.map((day, idx) => {
          const hasStrength = day.strengthTitle.trim();
          const activeEnd = day.endurance.filter(isActiveEntry);
          const isEmpty = !hasStrength && activeEnd.length === 0;
          return (
            <div key={idx} className="xp-card" style={{ padding: '13px 16px', display: 'flex', gap: 14 }}>
              <div style={{ width: 52, flexShrink: 0, display: 'flex', flexDirection: 'column', gap: 1, paddingTop: 1 }}>
                <span className="xp-day" style={{ fontSize: 15 }}>{DAYS[idx]}</span>
                <span style={{ fontSize: 11, color: 'var(--text-dim)', fontWeight: 500 }}>{fmtDate(dates[idx])}</span>
              </div>
              <div style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 8, minWidth: 0 }}>
                {isEmpty && <div style={{ fontSize: 13, color: 'var(--text-dim)', paddingTop: 1 }}>Ruhetag</div>}
                {hasStrength && (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                    <div style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.11em', textTransform: 'uppercase', color: 'var(--text-dim)' }}>Kraft</div>
                    <div style={{ fontSize: 14.5, fontWeight: 700, lineHeight: 1.3 }}>{day.strengthTitle}</div>
                    {day.strengthNote && <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{day.strengthNote}</div>}
                  </div>
                )}
                {activeEnd.map((entry, i) => {
                  const distNum = parseFloat(entry.distance) || 0;
                  const distStr = distNum > 0 ? `${distNum} ${SPORT_UNIT[entry.sport || '']}` : '';
                  const durStr = (entry.duration || 0) > 0 ? fmtDuration(entry.duration) : '';
                  const metric = [durStr, distStr, entry.pace, entry.label].filter(x => x && String(x).trim()).join(' · ');
                  const coupledBefore = i > 0 && activeEnd[i-1].coupled;
                  return (
                    <div key={i} style={{ display: 'flex', flexDirection: 'column', gap: 3, borderTop: (hasStrength || i > 0) ? `1px ${coupledBefore ? 'dashed ' + hexA('#f59e0b', 0.5) : 'solid var(--border)'}` : 'none', paddingTop: (hasStrength || i > 0) ? 8 : 0 }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
                        {entry.sport && <span style={{ fontSize: 9.5, fontWeight: 700, letterSpacing: '0.1em', textTransform: 'uppercase', color: accent }}>{entry.sport}</span>}
                        {coupledBefore && <span style={{ fontSize: 9, fontWeight: 700, letterSpacing: '0.08em', color: 'var(--koppel)', textTransform: 'uppercase' }}>⛓ Koppel</span>}
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        {entry.title && <span style={{ fontSize: 14, fontWeight: 700 }}>{entry.title}</span>}
                        {entry.intensity > 0 && (
                          <span style={{ display: 'flex', gap: 4 }}>
                            {[1,2,3,4,5].map(lvl => (<span key={lvl} style={{ width: 9, height: 9, borderRadius: '50%', display: 'inline-block', background: entry.intensity === lvl ? `var(--dot${lvl})` : 'var(--dot-off)' }}></span>))}
                          </span>
                        )}
                      </div>
                      {metric && <div style={{ fontSize: 12, color: 'var(--text-muted)' }}>{metric}</div>}
                      {entry.note && <div style={{ fontSize: 12, color: 'var(--text-muted)', fontStyle: 'italic' }}>{entry.note}</div>}
                    </div>
                  );
                })}
              </div>
            </div>
          );
        })}
      </div>
      {s.sessions > 0 && (
        <div style={{ display: 'flex', alignItems: 'center', gap: 18, borderTop: '1px solid var(--border)', paddingTop: 18 }}>
          <span style={{ fontSize: 13.5, color: 'var(--text-muted)' }}><b style={{ color: 'var(--text)', fontSize: 16 }}>{s.sessions}</b> Einheiten</span>
          {s.totalMinutes > 0 && <span style={{ fontSize: 13.5, color: 'var(--text-muted)' }}><b style={{ color: 'var(--text)', fontSize: 16 }}>{fmtDuration(s.totalMinutes)}</b> gesamt</span>}
          {distTotal > 0 && (
            <span style={{ display: 'flex', height: 8, flex: 1, borderRadius: 4, overflow: 'hidden', background: 'var(--dot-off)' }}>
              {distBasis.map((v, z) => v > 0 && (<span key={z} style={{ width: `${(v / distTotal) * 100}%`, background: ['var(--dot2)', 'var(--dot3)', 'var(--dot5)'][z] }}></span>))}
            </span>
          )}
        </div>
      )}
    </div>
  );
}

// ---------- App ----------
function App() {
  const [all, setAll] = useState(loadAllWeeks);
  const [sel, setSel] = useState(currentSel);
  const [pickerOpen, setPickerOpen] = useState(false);
  const [theme, setTheme] = useState(() => {
    try { return localStorage.getItem('tp_theme') || 'dark'; } catch(e) { return 'dark'; }
  });
  const key = weekKeyOf(sel);
  const week = all[key] || defaultWeek();
  const [openDays, setOpenDays] = useState(() => week.map(dayHasContent));
  const [exporting, setExporting] = useState('');
  const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

  const dates = getWeekDates(sel);
  const kw = sel.week;

  const selectWeek = (ns) => {
    setSel(ns);
    const nw = all[weekKeyOf(ns)] || defaultWeek();
    setOpenDays(nw.map(dayHasContent));
    setPickerOpen(false);
  };

  useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
    try { localStorage.setItem('tp_theme', theme); } catch(e) {}
  }, [theme]);

  useEffect(() => {
    const root = document.documentElement;
    root.setAttribute('data-variant', VARIANTS[t.variante] || 'pure');
    root.setAttribute('data-glow', t.glow ? 'on' : 'off');
    root.setAttribute('data-bg', BG_MODES[t.hintergrund] || 'raster');
    const accent = t.akzent;
    const meta = ACCENTS[accent] || { contrast: '#fff' };
    root.style.setProperty('--accent', accent);
    root.style.setProperty('--accent-contrast', meta.contrast);
    root.style.setProperty('--accent-tint', hexA(accent, 0.13));
    root.style.setProperty('--accent-ring', hexA(accent, 0.25));
    root.style.setProperty('--accent-shadow', `0 5px 16px ${hexA(accent, 0.35)}`);
  }, [t.variante, t.akzent, t.glow, t.hintergrund]);

  const handleChange = useCallback((idx, newDay) => {
    setAll(prev => {
      const cw = prev[key] ? [...prev[key]] : defaultWeek();
      cw[idx] = newDay;
      const next = { ...prev, [key]: cw };
      saveAllWeeks(next);
      return next;
    });
  }, [key]);

  const toggleDay = (idx) => {
    setOpenDays(prev => prev.map((o, i) => i === idx ? !o : o));
  };

  const handleClear = () => {
    if (!confirm(`Wirklich alle Einträge der KW ${String(kw).padStart(2, '0')} löschen? Das kann nicht rückgängig gemacht werden.`)) return;
    setAll(prev => {
      const next = { ...prev };
      delete next[key];
      saveAllWeeks(next);
      return next;
    });
    setOpenDays(DAYS.map(() => false));
  };

  const handleExport = async (which) => {
    setExporting(which);
    try {
      const el = document.getElementById(which === 'story' ? 'export-story' : 'export-wide');
      const canvas = await html2canvas(el, {
        backgroundColor: cssVar('--bg') || '#0c0c0e',
        scale: 2,
        useCORS: true,
        logging: false,
      });
      const link = document.createElement('a');
      link.download = which === 'story'
        ? `trainingsplan-kw${String(kw).padStart(2,'0')}-story.png`
        : `trainingsplan-kw${String(kw).padStart(2,'0')}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    } catch(e) {
      alert('Export fehlgeschlagen.');
    }
    setExporting('');
  };

  return (
    <React.Fragment>
      <header className="app-header">
        <div className="logo-mark">
          <svg width="16" height="16" viewBox="0 0 18 18" fill="none" stroke="var(--accent-contrast)" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
            <path d="M1 9h3l2.5-6 4 12L13 9h4"></path>
          </svg>
        </div>
        <span className="app-title">Trainingsplanung</span>
        <div className="wk-group">
          <button className="wk-arrow" onClick={() => selectWeek(shiftSel(sel, -1))} title="Vorherige Woche">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M10 3L5 8l5 5"></path></svg>
          </button>
          <button className="kw-pill" onClick={() => setPickerOpen(o => !o)} title="Woche auswählen">
            KW {String(kw).padStart(2, '0')}{sel.year !== isoWeekYear() ? ` · ${sel.year}` : ''}
            <svg width="9" height="9" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6l5 5 5-5"></path></svg>
          </button>
          <button className="wk-arrow" onClick={() => selectWeek(shiftSel(sel, 1))} title="Nächste Woche">
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 3l5 5-5 5"></path></svg>
          </button>
          {pickerOpen && (
            <React.Fragment>
              <div className="wk-overlay" onClick={() => setPickerOpen(false)}></div>
              <div className="wk-pop">
                {key !== weekKeyOf(currentSel()) && (
                  <button className="wk-item today-link" onClick={() => selectWeek(currentSel())}>Zur aktuellen Woche</button>
                )}
                {Array.from({ length: 15 }, (_, i) => shiftSel(sel, i - 4)).map(ws => {
                  const k = weekKeyOf(ws);
                  const has = Array.isArray(all[k]) && all[k].some(dayHasContent);
                  const isNow = k === weekKeyOf(currentSel());
                  return (
                    <button key={k} className={`wk-item${k === key ? ' sel' : ''}`} onClick={() => selectWeek(ws)}>
                      <span style={{ fontWeight: isNow ? 800 : 600 }}>KW {String(ws.week).padStart(2, '0')}{ws.year !== isoWeekYear() ? ` · ${ws.year}` : ''}</span>
                      {has && <span className="wk-dot"></span>}
                      <span className="wk-range">{fmtRangeShort(getWeekDates(ws))}</span>
                    </button>
                  );
                })}
              </div>
            </React.Fragment>
          )}
        </div>
        <span className="week-range">{fmtRange(dates)}</span>
        <span className="header-spacer"></span>
        <button className="theme-toggle" onClick={() => setTheme(th => th === 'dark' ? 'light' : 'dark')} title={theme === 'dark' ? 'Heller Modus' : 'Dunkler Modus'}>
          {theme === 'dark' ? (
            <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <circle cx="12" cy="12" r="4"></circle>
              <path d="M12 2v2m0 16v2M4.93 4.93l1.41 1.41m11.32 11.32l1.41 1.41M2 12h2m16 0h2M4.93 19.07l1.41-1.41m11.32-11.32l1.41-1.41"></path>
            </svg>
          ) : (
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
              <path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"></path>
            </svg>
          )}
        </button>
      </header>

      <div className="app-body">
        <div className="left-panel" key={`l-${key}`}>
          <div className="panel-eyebrow">Planung</div>
          {week.map((day, idx) => (
            <DayCard key={idx} idx={idx} day={day} date={dates[idx]} open={openDays[idx]} onToggle={() => toggleDay(idx)} onChange={handleChange} />
          ))}
        </div>

        <div className="right-panel" key={`r-${key}`}>
          <div className="section-head">
            <span className="section-title">Wochenübersicht</span>
          </div>
          <WeekSummary week={week} />

          <div className="section-head">
            <span className="section-title">Vorschau</span>
            <span className="section-sub">So sieht dein geteilter Plan aus</span>
          </div>
          <div className="preview-grid">
            {week.map((day, idx) => (
              <PreviewCard key={idx} dayIdx={idx} day={day} date={dates[idx]} />
            ))}
          </div>

          <div className="actions-row">
            <button className="btn btn-ghost" onClick={handleClear}>
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6M1 7h22M9 7V4a1 1 0 011-1h4a1 1 0 011 1v3"></path>
              </svg>
              Alles löschen
            </button>
            <button className={`btn btn-secondary${exporting === 'story' ? ' loading' : ''}`} onClick={() => handleExport('story')}>
              <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <rect x="7" y="2" width="10" height="20" rx="2.5"></rect>
              </svg>
              {exporting === 'story' ? 'Wird exportiert…' : 'Story (9:16)'}
            </button>
            <button className={`btn btn-primary${exporting === 'wide' ? ' loading' : ''}`} onClick={() => handleExport('wide')}>
              <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                <path strokeLinecap="round" strokeLinejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
              </svg>
              {exporting === 'wide' ? 'Wird exportiert…' : 'Als PNG exportieren'}
            </button>
          </div>
        </div>
      </div>

      <div id="export-root">
        <ExportWide week={week} dates={dates} accent={t.akzent} kw={kw} />
        <ExportStory week={week} dates={dates} accent={t.akzent} kw={kw} />
      </div>

      <TweaksPanel>
        <TweakSection label="Design" />
        <TweakRadio label="Variante" value={t.variante} options={['Pure', 'Athletic', 'Soft']} onChange={(v) => setTweak('variante', v)} />
        <TweakColor label="Akzentfarbe" value={t.akzent} options={['#0A84FF', '#84CC16', '#FF6B2C', '#7C6AF7']} onChange={(v) => setTweak('akzent', v)} />
        <TweakRadio label="Hintergrund" value={t.hintergrund} options={['Ohne', 'Aurora', 'Raster', 'Verlauf']} onChange={(v) => setTweak('hintergrund', v)} />
        <TweakSection label="Details" />
        <TweakToggle label="Glow-Effekte" value={t.glow} onChange={(v) => setTweak('glow', v)} />
      </TweaksPanel>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Torch cursor: track mouse position relative to each glass element
const TORCH_SELECTORS = '.day-card, .stat-card, .preview-card, .theme-toggle';
document.addEventListener('mousemove', (e) => {
  const els = document.querySelectorAll(TORCH_SELECTORS);
  els.forEach(el => {
    const r = el.getBoundingClientRect();
    const x = ((e.clientX - r.left) / r.width * 100).toFixed(1) + '%';
    const y = ((e.clientY - r.top)  / r.height * 100).toFixed(1) + '%';
    el.style.setProperty('--lx', x);
    el.style.setProperty('--ly', y);
  });
}, { passive: true });
</script>
</body>
</html>
